<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Orlando Dental Care</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into a correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to refresh the page or register a
      // new history entry.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <script>
      // If the page is not found (which happens on GH pages deep links),
      // redirect to index.html with the path in the query string.
      // We slice(0, 2) to preserve the /orlando-dental-2 segment in the URL
      window.location.replace(
        window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '') + 
        window.location.pathname.split('/').slice(0, 2).join('/') + '/?/' + 
        window.location.pathname.split('/').slice(2).join('/').replace(/&/g, '~and~') + 
        (window.location.search ? '&' + window.location.search.slice(1).replace(/&/g, '~and~') : '') +
        window.location.hash
      );
    </script>
  </body>
</html>
